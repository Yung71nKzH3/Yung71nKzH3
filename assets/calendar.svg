<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=JetBrains+Mono&amp;display=swap');
        .container { font-family: 'Inter', sans-serif; }
        .date { font-size: 80px; font-weight: 700; fill: #f8fafc; }
        .month { font-size: 24px; font-weight: 400; fill: #818cf8; text-transform: uppercase; letter-spacing: 2px; }
        .day-name { font-size: 18px; font-weight: 400; fill: #94a3b8; }
        .holidays { font-size: 14px; fill: #cbd5e1; font-style: italic; }
        .progress-label { font-size: 12px; fill: #64748b; font-family: 'JetBrains Mono', monospace; }
        .progress-bg { fill: #1e293b; rx: 4; }
        .progress-bar { fill: #818cf8; rx: 4; }
    </style>
    
    <rect width="100%" height="100%" fill="#0f172a" rx="16"/>
    
    <!-- Decorative Glow -->
    <defs>
        <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
        </filter>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.1" />
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#grad)" rx="16"/>
    <circle cx="350" cy="50" r="60" fill="#818cf8" filter="url(#blur)" opacity="0.15"/>

    <g class="container" transform="translate(30, 40)">
        <text y="20" class="month">April 2026</text>
        <text y="100" class="date">24</text>
        <text x="120" y="85" class="day-name">Friday</text>
        
        <g transform="translate(0, 130)">
            <text y="0" class="holidays">No major holidays today</text>
        </g>
        
        <!-- Year Progress -->
        <g transform="translate(0, 170)">
            <text y="0" class="progress-label">Year Progress: 31.2%</text>
            <rect y="10" width="340" height="8" class="progress-bg"/>
            <rect y="10" width="106.19006102832446" height="8" class="progress-bar"/>
        </g>
    </g>
    
    <text x="370" y="230" text-anchor="end" style="fill: #334155; font-size: 10px; font-family: 'JetBrains Mono';">Last updated: 23:57 UTC</text>
</svg>